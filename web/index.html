<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>JWST Spectrum Viewer</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, sans-serif;
        background: radial-gradient(circle at top, #0b1b2b, #041018 60%, #02070c);
        color: #e9f3ff;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }
      main {
        padding: 2rem;
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.04);
        max-width: 44rem;
      }
      h1 {
        margin-top: 0;
      }
      code {
        background: rgba(255, 255, 255, 0.08);
        padding: 0.15rem 0.35rem;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>JWST Spectrum Viewer</h1>
      <p>Monorepo scaffold is ready.</p>
      <p>
        Run <code>make setup</code> to create <code>server/.venv</code>, then
        <code>make dev</code> to start the placeholder backend and frontend servers.
      </p>
    </main>
  </body>
</html>
